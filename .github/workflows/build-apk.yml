name: Build Password Manager APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # AGP 9.1.1 in this project requires Gradle 9.3.1 or newer.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # The project references ${rootDir}/debug.keystore for the debug
      # signing config. We generate a standard Android debug keystore
      # on the fly so nothing sensitive needs to be committed to the repo.
      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # Ensure a .env file exists so the secrets-gradle-plugin doesn't fail;
      # it falls back to .env.example values which are safe placeholders.
      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-manager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
